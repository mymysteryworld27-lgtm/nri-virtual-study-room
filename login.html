<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NRI Virtual Study Room - Login</title>

 <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:,">

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(
        135deg,
        #050b18,
        #081b33,
        #0f4c81
    );

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{

    width:400px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    padding:35px;

    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.4);

    text-align:center;

    color:white;
}

.login-card h1{

    margin-bottom:10px;

    color:#00e5ff;
}

.login-card p{

    color:#d5e8ff;
}

input{

    width:100%;

    padding:14px;

    margin-top:12px;

    border:none;

    border-radius:10px;

    outline:none;

    box-sizing:border-box;
}

button{

    width:100%;

    margin-top:15px;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#00e5ff;

    color:black;

    font-weight:bold;

    cursor:pointer;

    font-size:16px;
}

button:hover{

    background:#00c8e0;
}

.show-password{

    margin-top:10px;

    text-align:left;

    color:white;
}

</style>

</head>

<body>

<div class="login-card">

    <h1>NRI Virtual Study Room</h1>

    <p>Login to continue</p>

    <input
    type="email"
    id="email"
    placeholder="Enter Email">

    <input
    type="password"
    id="password"
    placeholder="Enter Password">

    <div class="show-password">

        <input
        type="checkbox"
        id="showPass"
        onclick="togglePassword()">

        Show Password

    </div>

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function togglePassword(){

    const password =
    document.getElementById(
    "password"
    );

    if(password.type==="password"){

        password.type="text";

    }else{

        password.type="password";
    }
}

function login(){

    const email =
    document.getElementById(
    "email"
    ).value;

    const password =
    document.getElementById(
    "password"
    ).value;

    if(
        email === "" ||
        password === ""
    ){

        alert(
        "Please enter Email and Password"
        );

        return;
    }

    localStorage.setItem(
        "email",
        email
    );

    localStorage.setItem(
        "loggedIn",
        "true"
    );

    alert(
        "Login Successful"
    );

    window.location.href =
    "dashboard.html";
}

</script>

</body>
</html>
